<svg width="544" height="306" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots3" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#7aa2f7" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="544" height="306" fill="#1a1b26"/>
  <rect width="544" height="306" fill="url(#dots3)"/>

  <!-- Project name -->
  <text x="272" y="100" font-family="monospace, 'Courier New', Courier" font-size="32" font-weight="700" fill="url(#grad3)" text-anchor="middle">Open WebUI</text>
  <text x="272" y="134" font-family="monospace, 'Courier New', Courier" font-size="28" font-weight="700" fill="url(#grad3)" text-anchor="middle">Ultimate Stack</text>

  <!-- Description -->
  <text x="272" y="164" font-family="monospace, 'Courier New', Courier" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">Docker · RAG · MCP · TTS · OCR · Search</text>

  <!-- Neural network: input layer (left), hidden layer (center), output node (right) -->
  <!-- Connections: input → hidden -->
  <line x1="186" y1="200" x2="252" y2="192" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="200" x2="252" y2="218" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="200" x2="252" y2="244" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="226" x2="252" y2="192" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="226" x2="252" y2="218" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="226" x2="252" y2="244" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="252" x2="252" y2="192" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="252" x2="252" y2="218" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <line x1="186" y1="252" x2="252" y2="244" stroke="url(#grad3)" stroke-width="1" opacity="0.25"/>
  <!-- Connections: hidden → output -->
  <line x1="252" y1="192" x2="358" y2="226" stroke="url(#grad3)" stroke-width="1" opacity="0.35"/>
  <line x1="252" y1="218" x2="358" y2="226" stroke="url(#grad3)" stroke-width="1" opacity="0.35"/>
  <line x1="252" y1="244" x2="358" y2="226" stroke="url(#grad3)" stroke-width="1" opacity="0.35"/>

  <!-- Input layer nodes -->
  <circle cx="186" cy="200" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="186" cy="226" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.65"/>
  <circle cx="186" cy="252" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.5"/>

  <!-- Hidden layer nodes -->
  <circle cx="252" cy="192" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="252" cy="218" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.85"/>
  <circle cx="252" cy="244" r="7" fill="none" stroke="url(#grad3)" stroke-width="1.5" opacity="0.7"/>

  <!-- Output node -->
  <circle cx="358" cy="226" r="10" fill="none" stroke="url(#grad3)" stroke-width="2" opacity="1"/>
</svg>
