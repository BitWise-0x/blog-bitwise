<svg width="544" height="306" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots5" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#7aa2f7" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="544" height="306" fill="#1a1b26"/>
  <rect width="544" height="306" fill="url(#dots5)"/>

  <!-- Project name -->
  <text x="272" y="100" font-family="monospace, 'Courier New', Courier" font-size="32" font-weight="700" fill="url(#grad5)" text-anchor="middle">Homebridge</text>
  <text x="272" y="136" font-family="monospace, 'Courier New', Courier" font-size="28" font-weight="700" fill="url(#grad5)" text-anchor="middle">Blink Security</text>

  <!-- Description -->
  <text x="272" y="168" font-family="monospace, 'Courier New', Courier" font-size="13" fill="rgba(255,255,255,0.7)" text-anchor="middle">Blink Cameras · Live View · HomeKit</text>

  <!-- Camera body -->
  <rect x="224" y="200" width="60" height="42" rx="4" fill="none" stroke="url(#grad5)" stroke-width="1.8" opacity="0.9"/>
  <!-- Lens outer ring -->
  <circle cx="254" cy="221" r="13" fill="none" stroke="url(#grad5)" stroke-width="1.5" opacity="0.7"/>
  <!-- Lens inner -->
  <circle cx="254" cy="221" r="6" fill="none" stroke="url(#grad5)" stroke-width="1.5" opacity="1"/>
  <!-- Camera mount/arm -->
  <line x1="284" y1="221" x2="310" y2="221" stroke="url(#grad5)" stroke-width="2" opacity="0.6"/>
  <!-- Motion detection arcs -->
  <path d="M 318 210 Q 330 221 318 232" fill="none" stroke="url(#grad5)" stroke-width="1.5" opacity="0.5"/>
  <path d="M 324 204 Q 342 221 324 238" fill="none" stroke="url(#grad5)" stroke-width="1.5" opacity="0.3"/>
</svg>
